<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wristly Ultra S</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --green:#98A869;
  --purple:#8469A8;
  --bg:#0f0f10;
  --card:#151517;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter", system-ui, sans-serif;
}

body{
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
  animation:pageIn .7s ease;
}

@keyframes pageIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* HEADER */
header{
  padding:26px 40px;
  background:#111;
  border-bottom:1px solid #222;
}

/* TITLE */
.logo{
  font-size:64px;
  font-weight:800;
  letter-spacing:2px;
  cursor:pointer;
  display:inline-block;
  transition:.25s ease;
}
.logo:hover{
  color:var(--green);
  transform:translateY(-2px) scale(1.03);
  letter-spacing:2px;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:45px;
  padding:45px;
}

/* IMAGE */
.product-img{
  width:100%;
  border-radius:2px;
  border:1px solid rgba(255,255,255,0.08);
  transition:.35s ease;
}
.product-img:hover{
  transform:translateY(-10px) scale(1.03);
  border:1px solid rgba(152,168,105,0.4);
  filter:brightness(1.05);
}

/* CARD */
.card{
  background:var(--card);
  padding:24px;
  border-radius:2px;
  transition:.3s ease;
}
.card:hover{
  transform:translateY(-6px);
}

/* BUTTON */
.button{
  margin-top:20px;
  width:100%;
  padding:20px;
  font-size:18px;
  font-weight:800;
  border:none;
  cursor:pointer;
  background:var(--green);
  color:#000;
  border-radius:2px;
  position:relative;
  overflow:hidden;
  transition:.25s ease;
}
.button:hover{
  transform:scale(1.05);
  letter-spacing:1px;
}
.button:active{
  transform:scale(0.97);
}

/* SHINE */
.button::after{
  content:"";
  position:absolute;
  top:-60%;
  left:-70%;
  width:45%;
  height:200%;
  background:rgba(255,255,255,0.15);
  transform:rotate(20deg);
  opacity:0;
}
.button:hover::after{
  animation:shine .7s ease;
}
@keyframes shine{
  0%{left:-70%; opacity:0;}
  20%{opacity:1;}
  100%{left:130%; opacity:0;}
}

/* DROPDOWNS */
details{
  margin-top:14px;
  background:#1a1a1c;
  padding:14px;
  border-radius:2px;
  transition:.3s ease;
}
details:hover{
  transform:translateX(4px);
}
details[open] p{
  animation:drop .35s ease;
}
@keyframes drop{
  from{opacity:0; transform:translateY(-8px);}
  to{opacity:1; transform:translateY(0);}
}

summary{
  font-weight:700;
  color:var(--green);
  cursor:pointer;
  transition:.2s ease;
}
summary:hover{
  letter-spacing:.6px;
  transform:translateX(3px);
}

/* HIGHLIGHT */
.highlight{
  color:var(--purple);
}
.highlight:hover{
  text-shadow:0 0 10px rgba(132,105,168,0.5);
}

html{scroll-behavior:smooth;}
</style>
</head>

<body>

<header>
  <div class="logo">Wristly</div>
</header>

<div class="container">

  <div>
    <img class="product-img" src="https://ae01.alicdn.com/kf/Sd715d33e4f4542a4bc6b7f37206b8c64o.png"/>
    <button class="button">Buy Now – Wristly Ultra S</button>
  </div>

  <div class="card">
    <h2>Wristly Ultra S</h2>
    <p style="margin-top:10px; opacity:.8;">
      A refined smartwatch experience built for simplicity and smooth interaction.
    </p>

    <details>
      <summary>What’s in the package</summary>
      <p>
        Smart Watch X1<br>
        <span class="highlight">Original Strap</span> X1<br>
        Instruction Manual X1<br>
        Charging Cable
      </p>
    </details>

    <details>
      <summary>What you get</summary>
      <p>
        Premium <span class="highlight">AMOLED display</span>,
        smooth performance, and refined usability.
      </p>
    </details>
  </div>

</div>

</body>
</html>
